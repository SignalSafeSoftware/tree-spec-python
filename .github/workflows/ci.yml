name: CI

on:
    workflow_dispatch:
    push:
        branches: [main]
    pull_request:
        branches: [main, develop]
        types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    checks:
        name: Checks (Python ${{ matrix.python-version }})
        if: |
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'checks'))
        runs-on: ubuntu-latest
        container: node:24-alpine
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13"]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install build dependencies
              run: apk add --no-cache gcc musl-dev libffi-dev

            - name: Install package and tooling
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]" flake8 bandit

            - name: Flake8
              if: matrix.python-version == '3.12'
              run: flake8 __init__.py builder.py constants.py lint.py models.py patch.py tests --max-line-length=120 --extend-ignore=E203,W503

            - name: Bandit
              if: matrix.python-version == '3.12'
              run: bandit -r . -q -x ./tests

    tests:
        name: Tests (Python ${{ matrix.python-version }})
        if: |
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'tests'))
        runs-on: ubuntu-latest
        container: node:24-alpine
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13"]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install build dependencies
              run: apk add --no-cache gcc musl-dev libffi-dev

            - name: Install package and tooling
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]" pytest-cov

            - name: Pytest with coverage
              run: python -m pytest -q --cov=deliveryplus_tree_spec --cov-report=xml

            - name: Upload coverage
              if: matrix.python-version == '3.12'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage.xml

    scan:
        name: Scan
        needs: [tests]
        if: |
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'scan'))
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        env:
            SONAR_TOKEN: ${{ secrets.PACKAGES_SONAR_TOKEN }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download coverage
              uses: actions/download-artifact@v4
              with:
                  name: coverage
                  path: .

            - name: Verify coverage report
              run: test -f coverage.xml

            - name: SonarCloud scan
              uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995

            - name: Sonar PR comment
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = `SonarCloud analysis for \`tree-spec-python\` (\`SignalSafeSoftware_tree-spec\`) completed with result \`${{ job.status }}\`.`;
                      await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                      });

    publish:
        name: Publish
        needs: [checks, tests, scan]
        if: |
            (
              github.event_name == 'workflow_dispatch' ||
              (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'publish'))
            ) &&
            (needs.checks.result == 'success' && needs.tests.result == 'success' && needs.scan.result == 'success')
        runs-on: ubuntu-latest
        container: node:24-alpine
        permissions:
            contents: read
            id-token: write
        environment: pypi
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install build dependencies
              run: apk add --no-cache gcc musl-dev libffi-dev

            - name: Build distributions
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]" build twine
                  python -m build
                  twine check dist/*

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
