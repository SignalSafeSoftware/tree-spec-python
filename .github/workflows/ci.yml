name: CI

on:
    workflow_dispatch:
    push:
        branches: [main]
        tags: ["v*"]
    pull_request:
        branches: [main, develop]
        types: [opened, synchronize, reopened]

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    checks:
        name: Checks (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13"]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
              with:
                  enable-cache: true

            - name: Install package and tooling
              run: |
                  uv venv --seed
                  uv export --extra dev --frozen --no-emit-project -o requirements-dev.txt
                  .venv/bin/python -m pip install --require-hashes --only-binary :all: --no-deps -r requirements-dev.txt
                  .venv/bin/python -m pip install --no-deps -e .

            - name: Flake8
              if: matrix.python-version == '3.12'
              run: .venv/bin/flake8 __init__.py builder.py constants.py lint.py models.py patch.py tests --max-line-length=120 --extend-ignore=E203,W503

            - name: Bandit
              if: matrix.python-version == '3.12'
              run: .venv/bin/bandit -r . -q -x ./tests,./.venv

    tests:
        name: Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.12", "3.13"]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
              with:
                  enable-cache: true

            - name: Install package and tooling
              run: |
                  uv venv --seed
                  uv export --extra dev --frozen --no-emit-project -o requirements-dev.txt
                  .venv/bin/python -m pip install --require-hashes --only-binary :all: --no-deps -r requirements-dev.txt
                  .venv/bin/python -m pip install --no-deps -e .

            - name: Pytest with coverage
              run: .venv/bin/python -m pytest -q --cov-report=xml

            - name: Upload coverage
              if: matrix.python-version == '3.12'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage.xml

    scan:
        name: Scan
        needs: [tests]
        if: |
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'scan'))
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        env:
            SONAR_TOKEN: ${{ secrets.PACKAGES_SONAR_TOKEN }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download coverage
              uses: actions/download-artifact@v4
              with:
                  name: coverage
                  path: .

            - name: Verify coverage report
              run: test -f coverage.xml

            - name: SonarCloud scan
              uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995

            - name: Sonar PR comment
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = `SonarCloud analysis for \`tree-spec-python\` (\`SignalSafeSoftware_tree-spec\`) completed with result \`${{ job.status }}\`.`;
                      await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                      });

    publish:
        name: Publish
        needs: [checks, tests, scan]
        if: |
            (
              (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
              (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
            ) &&
            needs.checks.result == 'success' &&
            needs.tests.result == 'success' &&
            needs.scan.result == 'success'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        environment: pypi
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
              with:
                  enable-cache: true

            - name: Build distributions
              run: |
                  uv venv --seed
                  uv export --extra dev --frozen --no-emit-project -o requirements-dev.txt
                  .venv/bin/python -m pip install --require-hashes --only-binary :all: --no-deps -r requirements-dev.txt
                  .venv/bin/python -m build
                  .venv/bin/twine check dist/*

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
